name: Release Gost

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.goos }}_${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: 7
          # Windows
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          # macOS
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME=gost
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME=gost.exe
          fi
          
          # 关键点：使用 -s -w 代替外部 strip 工具，跨平台无报错
          go build -ldflags="-s -w" -o "$BINARY_NAME" ./cmd/gost
          
          echo "BINARY_PATH=$BINARY_NAME" >> $GITHUB_ENV

      - name: UPX Compression
        uses: svenstaro/upx-action@v2
        # 排除 macOS arm64 (签名问题) 和 Windows arm64 (UPX 暂不支持)
        if: |
          (matrix.goos != 'darwin' || matrix.goarch != 'arm64') &&
          (matrix.goos != 'windows' || matrix.goarch != 'amd64')
        with:
          files: ${{ env.BINARY_PATH }}
          args: --best --lzma
          strip: false # 重要：设为 false，防止报错，编译时已 strip 过

      - name: Package Assets
        run: |
          RELEASE_NAME=gost_${{ matrix.goos }}_${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "linux" ] && [ "${{ matrix.goarch }}" = "arm" ]; then
            RELEASE_NAME=gost_${{ matrix.goos }}_${{ matrix.goarch }}v${{ matrix.goarm }}
          fi
          
          mkdir -p release_dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "release_dist/${RELEASE_NAME}.zip" "${{ env.BINARY_PATH }}"
            echo "ASSET_PATH=release_dist/${RELEASE_NAME}.zip" >> $GITHUB_ENV
          else
            tar -czvf "release_dist/${RELEASE_NAME}.tar.gz" "${{ env.BINARY_PATH }}"
            echo "ASSET_PATH=release_dist/${RELEASE_NAME}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: ${{ env.ASSET_PATH }}
          generate_release_notes: true